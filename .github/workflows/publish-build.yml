name: Publish Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.1.0)"
        required: true
  # TODO: Remove before merging to main — test trigger only
  push:
    branches:
      - ci/add-ecr-publishing

permissions:
  id-token: write
  contents: write

jobs:
  artifacts:
    uses: ./.github/workflows/artifacts.yml
    with:
      version: ${{ inputs.version || '' }}
    secrets: inherit
